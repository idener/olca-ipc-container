---
name: Image deployment

#
# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ Test в”Ӯ   в”Ӯ Build в”Ӯ   в”ӮPush to в”Ӯ   в”ӮUpdate K8sв”Ӯ
# в”Ӯ      в”ңв”Җв”Җв–әв”Ӯ Image в”ңв”Җв”Җв–әв”ӮRegistryв”ңв”Җв”Җв–әв”Ӯmanifests в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
# 

on:
  release:
    types: [published]
  workflow_dispatch:


env:
  IMAGE_NAME: terasun/openlca
  REGISTRY_URL: registry.idener.ai


concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-push:
    name: Build & push image
    runs-on: idener-runners

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata action
        id: meta
        uses: docker/metadata-action@v5.9.0
        with:
          images: |
            ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to Docker Hardened Images (dhi.io)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6.18.0
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_IMAGE=dhi.io/maven:3-jdk-17-debian13-dev
            BASE_IMAGE=dhi.io/eclipse-temurin:17-jre-debian13
